<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Капитанский Архив v7.0</title>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: Arial; padding: 20px; text-align: center; }
        input, button, select, textarea { margin: 8px; padding: 10px; font-size: 16px; background: #333; color: #eee; border: 1px solid #555; border-radius: 5px; }
        button { background: #ff9900; color: #000; font-weight: bold; cursor: pointer; }
        .entry { background: #222; border-radius: 8px; padding: 15px; margin: 20px 0; text-align: left; }
        .entry h3 { color: #ff9900; }
        .media { display: flex; flex-wrap: wrap; gap: 10px; }
        .media img { max-width: 200px; max-height: 200px; border-radius: 8px; border: 2px solid #555; }
        .media iframe { width: 300px; height: 200px; border-radius: 8px; border: 2px solid #555; }
        #login, #app { display: none; }
    </style>
</head>
<body>
    <div id="login">
        <h1>🛴 Капитанский Архив</h1>
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="checkPass()">Войти</button>
    </div>
    <div id="app">
        <h1>🛴 Архив Капитана</h1>
        <div id="tokenSetup">
            <p>Введи токен GitHub (только один раз):</p>
            <input type="password" id="tokenInput" placeholder="ghp_...">
            <button onclick="saveToken()">Сохранить токен</button>
        </div>
        <div id="publisher">
            <input type="date" id="dateInput">
            <select id="categoryInput">
                <option value="Трюки">Трюки</option>
                <option value="Зал">Зал</option>
                <option value="Еда">Еда</option>
                <option value="Люди">Люди</option>
                <option value="Природа">Природа</option>
                <option value="Другое">Другое</option>
            </select>
            <textarea id="noteInput" rows="2" placeholder="Твоя заметка..."></textarea>
            <input type="file" id="photoFile" accept="image/*">
            <input type="url" id="videoUrl" placeholder="Ссылка на видео (YouTube)">
            <button onclick="publishEntry()">Опубликовать</button>
            <div id="status"></div>
        </div>
        <div id="entries">Загрузка...</div>
    </div>

    <script>
        const PASSWORD = 'track360';
        const REPO_OWNER = 'kep0956kononenko-ctrl';
        const REPO_NAME = 'captain-diary-auto';
        const DATA_PATH = 'data.json';
        const MEDIA_FOLDER = 'media/';

        let githubToken = localStorage.getItem('github_token');

        window.onload = function() {
            document.getElementById('login').style.display = 'block';
            document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
        };

        function checkPass() {
            if (document.getElementById('pass').value === PASSWORD) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                if (githubToken) {
                    document.getElementById('tokenSetup').style.display = 'none';
                    loadEntries();
                } else {
                    document.getElementById('tokenSetup').style.display = 'block';
                }
            } else {
                alert('Неверный пароль!');
            }
        }

        function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) return alert('Введи токен!');
            githubToken = token;
            localStorage.setItem('github_token', token);
            document.getElementById('tokenSetup').style.display = 'none';
            loadEntries();
        }

        async function loadEntries() {
            const container = document.getElementById('entries');
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_PATH}`, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });
                if (!response.ok) throw new Error('Не могу загрузить data.json');
                const data = await response.json();
                const content = JSON.parse(atob(data.content));
                container.innerHTML = '';
                content.reverse().forEach(entry => {
                    const div = document.createElement('div');
                    div.className = 'entry';
                    let mediaHTML = '';
                    if (entry.media) {
                        entry.media.forEach(m => {
                            if (m.type === 'photo') {
                                mediaHTML += `<img src="${m.url}" alt="photo">`;
                            } else if (m.type === 'video') {
                                let embedUrl = m.url;
                                if (m.url.includes('youtube.com/watch?v=')) {
                                    embedUrl = `https://www.youtube.com/embed/${new URL(m.url).searchParams.get('v')}`;
                                } else if (m.url.includes('youtu.be/')) {
                                    embedUrl = `https://www.youtube.com/embed/${m.url.split('youtu.be/')[1].split('?')[0]}`;
                                }
                                mediaHTML += `<iframe src="${embedUrl}" allowfullscreen></iframe>`;
                            }
                        });
                    }
                    div.innerHTML = `<h3>${entry.date} — ${entry.category}</h3><p>${entry.note || ''}</p><div class="media">${mediaHTML}</div>`;
                    container.appendChild(div);
                });
            } catch (err) {
                container.innerHTML = '<p>Ошибка загрузки. Проверь токен и файлы.</p>';
            }
        }

        async function publishEntry() {
            if (!githubToken) return alert('Сначала введи токен!');
            const date = document.getElementById('dateInput').value;
            const category = document.getElementById('categoryInput').value;
            const note = document.getElementById('noteInput').value;
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const photoFile = document.getElementById('photoFile').files[0];
            const status = document.getElementById('status');
            status.textContent = 'Публикую...';

            try {
                let photoUrl = null;
                if (photoFile) {
                    const reader = new FileReader();
                    const photoData = await new Promise((resolve) => {
                        reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                        reader.readAsDataURL(photoFile);
                    });
                    const photoName = Date.now() + '_' + photoFile.name;
                    await githubPut(`${MEDIA_FOLDER}${photoName}`, photoData, `Upload photo ${photoName}`);
                    photoUrl = `https://${REPO_OWNER}.github.io/${REPO_NAME}/${MEDIA_FOLDER}${photoName}`;
                }

                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_PATH}`, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });
                const data = await response.json();
                const entries = JSON.parse(atob(data.content));
                const newEntry = { date, category, note, media: [] };
                if (photoUrl) newEntry.media.push({ type: 'photo', url: photoUrl });
                if (videoUrl) newEntry.media.push({ type: 'video', url: videoUrl });
                entries.push(newEntry);

                await githubPut(DATA_PATH, btoa(JSON.stringify(entries, null, 2)), 'Update diary', data.sha);
                status.textContent = 'Опубликовано! Обнови страницу.';
                document.getElementById('photoFile').value = '';
                document.getElementById('videoUrl').value = '';
                document.getElementById('noteInput').value = '';
            } catch (err) {
                status.textContent = 'Ошибка: ' + err.message;
            }
        }

        async function githubPut(path, content, message, sha = null) {
            const body = { message, content };
            if (sha) body.sha = sha;
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${githubToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.message);
            }
            return response.json();
        }
    </script>
</body>
</html>
